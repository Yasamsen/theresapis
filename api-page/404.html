<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>404</title>
    <style>
        * {
            color: #333;
        }
        body, html {
            height: 100%;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f9fafb, #e5e7eb);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .bg-divider {
            background-color: #d1d5db;
        }
        .w-divider {
            width: 2px;
        }

        /* Animasi */
        .fade-in {
            animation: fadeIn 1.2s ease-in-out;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glow {
            text-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        .sub-text {
            color: #6b7280;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex flex-col items-center justify-center h-screen text-white fade-in">
        <div class="flex h-5 items-center space-x-4">
            <h1 class="text-5xl font-extrabold glow" style="color: #111827">404</h1>
            <div class="shrink-0 bg-divider border-none h-full w-divider" role="separator"></div>
            <h2 style="color: #374151" class="text-lg font-medium">Page Not Found</h2>
        </div>

        <p class="sub-text">Oops... halaman yang kamu cari hilang atau tidak tersedia 😢</p>

        <a href="/" class="mt-6 px-4 py-2 bg-gray-900 text-white rounded-xl shadow hover:bg-gray-700 transition duration-300">
            Kembali ke Home
        </a>
    </div>
</body>
</html>
